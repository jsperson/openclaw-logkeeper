name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        run: |
          output=$(npm publish --provenance --access public 2>&1)
          exit_code=$?
          echo "$output"
          if echo "$output" | grep -q "You cannot publish over"; then
            echo "Version already published on npm — skipping."
          elif [ $exit_code -ne 0 ]; then
            exit $exit_code
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Authenticate with ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser

      - name: Pack for ClawHub
        run: clawhub package pack .

      - name: Publish to ClawHub
        run: clawhub package publish ./openclaw-logkeeper-*.tgz --family code-plugin --source-repo ${{ github.repository }} --source-commit ${{ github.sha }} --source-ref ${{ github.ref_name }} --json
